<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>营养拍 — 拍照识别食物热量</title>

<!-- PWA Meta -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="营养拍">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#00B894">
<meta name="description" content="拍照识别食物热量，记录每日营养摄入">

<!-- App Icon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2300B894%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text x=%2250%22 y=%2255%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22 dominant-baseline=%22central%22>📸</text></svg>">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect fill=%22%2300B894%22 width=%22100%22 height=%22100%22 rx=%2220%22/><text x=%2250%22 y=%2255%22 font-size=%2250%22 text-anchor=%22middle%22 fill=%22white%22 dominant-baseline=%22central%22>📸</text></svg>">

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --mint:#00B894;--mint2:#55EFC4;--mint-dark:#00A381;--red:#e74c3c;
  --bg:#f0f4f3;--card:#fff;--text:#1a1a2e;--sub:#6b7280;--line:#eef1f0;
  --shadow-sm:0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:0 8px 24px rgba(0,0,0,.08);
  --radius-sm:10px;--radius:16px;--radius-lg:22px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:linear-gradient(180deg,#e8f5f0 0%,#f0f4f3 30%,#f5f6f8 100%);
  color:var(--text);min-height:100vh;overflow-x:hidden;
  -webkit-tap-highlight-color:transparent;
  -webkit-user-select:none;user-select:none;
  -webkit-overflow-scrolling:touch;
}
.app{max-width:480px;margin:0 auto;min-height:100vh;position:relative;padding-bottom:calc(88px + var(--safe-bottom))}
.page{display:none;padding:12px 16px 16px;animation:fadeIn .3s cubic-bezier(.4,0,.2,1)}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

/* Install Banner */
.install-banner{
  display:none;background:linear-gradient(135deg,var(--mint),var(--mint-dark));
  color:#fff;padding:10px 16px;align-items:center;justify-content:space-between;gap:10px;
  position:sticky;top:0;z-index:50;border-radius:0 0 16px 16px;
}
.install-banner.show{display:flex}
.install-banner .msg{font-size:12px;font-weight:500;flex:1}
.install-banner button{background:#fff;color:var(--mint);border:none;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
.install-banner .close{background:transparent;color:rgba(255,255,255,.6);padding:4px 6px;font-size:16px;border:none;cursor:pointer}

/* Floating Tab Bar */
.tab-bar{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  width:calc(100% - 32px);max-width:448px;z-index:100;
  background:rgba(255,255,255,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:flex;border-radius:20px;padding:4px;
  box-shadow:0 2px 20px rgba(0,0,0,.08),0 0 0 1px rgba(0,0,0,.04);
  margin-bottom:var(--safe-bottom);
}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;
  padding:8px 0;cursor:pointer;border:none;background:transparent;
  color:var(--sub);font-size:10px;font-weight:500;transition:all .2s;font-family:inherit;
  -webkit-tap-highlight-color:transparent;min-height:52px;justify-content:center;
  border-radius:16px;position:relative;
}
.tab-btn.active{color:var(--mint)}
.tab-btn.active::before{content:'';position:absolute;inset:4px;background:rgba(0,184,148,.08);border-radius:14px}
.tab-btn .icon{font-size:21px;position:relative;z-index:1}

/* Header */
.header{padding:14px 0 8px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,var(--mint-dark),var(--mint));-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:-.5px}

/* Camera */
.camera-container{background:#111;border-radius:var(--radius-lg);overflow:hidden;position:relative;aspect-ratio:4/3;margin-bottom:10px;box-shadow:var(--shadow-lg)}
.camera-container video{width:100%;height:100%;object-fit:cover;display:block}
.camera-container .scan-lines{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(255,255,255,.02) 2px,rgba(255,255,255,.02) 4px);pointer-events:none}
.capture-btn{
  position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
  width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.95);
  border:3px solid var(--mint);cursor:pointer;transition:all .2s;
  box-shadow:0 0 0 8px rgba(0,184,148,.15),0 4px 20px rgba(0,0,0,.25);
}
.capture-btn::after{content:'';position:absolute;inset:-12px;border-radius:50%;border:2px solid rgba(255,255,255,.3);animation:capturePulse 2s infinite}
@keyframes capturePulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.08);opacity:0}}
.capture-btn:active{transform:translateX(-50%) scale(.88)}
.capture-hint{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;font-weight:500;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);padding:6px 16px;border-radius:20px;letter-spacing:.5px}
.preview-thumb{width:72px;height:72px;object-fit:cover;border-radius:14px;cursor:pointer;flex-shrink:0;border:2px solid transparent;box-shadow:var(--shadow-sm);transition:all .2s}
.preview-thumb:active{border-color:var(--mint);transform:scale(.95)}

/* Cards */
.card{background:var(--card);border-radius:var(--radius);padding:18px;margin-bottom:10px;box-shadow:var(--shadow-sm)}
.card h3{font-size:15px;margin-bottom:10px;color:var(--text);font-weight:700}

/* Search */
.search-box{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.search-box input{flex:1;padding:13px 16px;border:1.5px solid var(--line);border-radius:var(--radius-sm);font-size:15px;outline:none;font-family:inherit;transition:all .2s;-webkit-appearance:none;background:#f9fafb}
.search-box input:focus{border-color:var(--mint);background:#fff;box-shadow:0 0 0 3px rgba(0,184,148,.08)}
.search-box button{background:var(--mint);color:#fff;border:none;padding:13px;border-radius:var(--radius-sm);font-size:18px;cursor:pointer;font-family:inherit;width:48px;height:48px;display:flex;align-items:center;justify-content:center}

/* Food list */
.food-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:var(--radius-sm);cursor:pointer;transition:all .15s;margin-bottom:2px}
.food-item:active{background:#f0fdf8;transform:scale(.98)}
.food-item .name{font-weight:600;font-size:14px}
.food-item .unit{font-size:11px;color:var(--sub);margin-top:2px}
.food-item .cal{font-weight:700;color:var(--mint);font-size:14px;white-space:nowrap;background:#f0fdf8;padding:4px 10px;border-radius:8px}

/* Portion */
.portion-input{display:flex;align-items:center;gap:10px;margin:10px 0;justify-content:center}
.portion-input input{width:110px;padding:14px;border:2px solid var(--mint);border-radius:var(--radius-sm);font-size:22px;font-weight:700;text-align:center;font-family:inherit;outline:none;-webkit-appearance:none;color:var(--mint);background:#f0fdf8}
.portion-input span{color:var(--sub);font-size:14px;font-weight:500}
.quick-grams{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:10px 0}
.quick-grams button{padding:8px 16px;border:1.5px solid var(--line);border-radius:20px;background:#fff;font-size:13px;cursor:pointer;font-family:inherit;transition:all .15s;font-weight:500;color:var(--sub)}
.quick-grams button:active{background:var(--mint);color:#fff;border-color:var(--mint)}

/* Meal */
.meal-group{margin-bottom:20px}
.meal-group .meal-title{font-size:13px;font-weight:700;color:var(--mint);margin-bottom:8px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px}
.meal-group .meal-title .dot{width:6px;height:6px;border-radius:3px;background:var(--mint)}
.log-item{display:flex;align-items:center;gap:12px;padding:14px;background:#fafcfa;border-radius:var(--radius-sm);margin-bottom:6px;border:1px solid #f0f4f1;transition:all .15s}
.log-item:active{background:#f0fdf6}
.log-item .info{flex:1;min-width:0}
.log-item .food-name{font-weight:600;font-size:14px}
.log-item .detail{font-size:11px;color:var(--sub);margin-top:2px}
.log-item .kcals{font-weight:800;color:var(--text);font-size:15px;white-space:nowrap}
.log-item .del{color:#ccc;cursor:pointer;font-size:18px;padding:8px;border:none;background:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.log-item .del:active{background:#fef2f2;color:var(--red)}

/* Progress Ring */
.progress-ring-wrap{display:flex;align-items:center;justify-content:center;gap:24px;padding:20px 0}
.progress-ring{position:relative;width:130px;height:130px;flex-shrink:0}
.progress-ring svg{transform:rotate(-90deg);filter:drop-shadow(0 2px 8px rgba(0,184,148,.15))}
.progress-ring .center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.progress-ring .cal-num{font-size:32px;font-weight:800;color:var(--text);letter-spacing:-1px;line-height:1}
.progress-ring .cal-label{font-size:11px;color:var(--sub);margin-top:2px;font-weight:500}
.nutrient-bars{flex:1;min-width:140px;display:flex;flex-direction:column;gap:12px}
.nutrient-bar .nb-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px;font-weight:600}
.nutrient-bar .nb-label span:first-child{color:var(--sub)}
.nutrient-bar .nb-label span:last-child{color:var(--text)}
.nutrient-bar .nb-track{height:10px;border-radius:5px;background:#f0f2f5;overflow:hidden}
.nutrient-bar .nb-fill{height:100%;border-radius:5px;transition:width .6s cubic-bezier(.4,0,.2,1)}

/* Tags */
.tag{display:inline-block;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--line);background:#fff;transition:all .15s;font-family:inherit;margin:2px;color:var(--sub)}
.tag:active,.tag.active{background:var(--mint);color:#fff;border-color:var(--mint);box-shadow:0 2px 8px rgba(0,184,148,.2)}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s}
.modal-sheet{background:#fff;width:100%;max-width:480px;border-radius:24px 24px 0 0;padding:8px 18px calc(20px + var(--safe-bottom));max-height:80vh;overflow-y:auto;animation:slideUp .3s cubic-bezier(.4,0,.2,1);box-shadow:0 -4px 24px rgba(0,0,0,.1)}
.modal-sheet::before{content:'';display:block;width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 16px}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-sheet h3{font-size:18px;margin-bottom:14px;text-align:center;font-weight:700}

/* Settings */
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid var(--line)}
.setting-row .label{font-size:15px;font-weight:500}
.setting-row input{width:90px;padding:10px;border:1.5px solid var(--line);border-radius:var(--radius-sm);font-size:16px;text-align:center;font-family:inherit;outline:none;-webkit-appearance:none;font-weight:600;color:var(--mint)}
.setting-row input:focus{border-color:var(--mint);box-shadow:0 0 0 3px rgba(0,184,148,.08)}

/* Buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:13px 20px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .15s;font-family:inherit;gap:6px;min-height:48px;letter-spacing:.3px}
.btn:active{transform:scale(.97)}
.btn-primary{background:linear-gradient(135deg,var(--mint),var(--mint-dark));color:#fff;width:100%;box-shadow:0 4px 12px rgba(0,184,148,.25)}
.btn-primary:active{box-shadow:0 2px 6px rgba(0,184,148,.15)}
.btn-outline{background:#fff;color:var(--mint);border:1.5px solid var(--mint)}
.btn-block{width:100%}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);backdrop-filter:blur(8px);color:#fff;padding:12px 24px;border-radius:24px;font-size:13px;font-weight:600;z-index:300;pointer-events:none;animation:toastIn .3s;letter-spacing:.3px}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.hidden{display:none!important}
.pt-8{padding-top:8px}
.text-center{text-align:center}
.text-sub{color:var(--sub);font-size:12px}
.mb-8{margin-bottom:8px}
.mb-12{margin-bottom:12px}
.empty-state{text-align:center;padding:56px 20px;color:var(--sub)}
.empty-state .big{font-size:64px;margin-bottom:12px;opacity:.8}

/* Splash */
.splash{position:fixed;inset:0;background:linear-gradient(160deg,#00B894 0%,#00A381 50%,#008B6B 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .5s,visibility .5s}
.splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.splash .logo{font-size:80px;margin-bottom:20px;animation:splashPulse 2s infinite;filter:drop-shadow(0 4px 12px rgba(0,0,0,.1))}
.splash .title{color:#fff;font-size:34px;font-weight:800;letter-spacing:6px}
.splash .sub{color:rgba(255,255,255,.65);font-size:14px;margin-top:10px;letter-spacing:3px;font-weight:500}
@keyframes splashPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}

/* Analyze result styling */
.analyze-dish-name{font-size:20px;font-weight:700;text-align:center;margin-bottom:4px}
.analyze-cal-big{font-size:48px;font-weight:800;text-align:center;background:linear-gradient(135deg,var(--mint-dark),var(--mint));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
.analyze-macros{display:flex;gap:16px;justify-content:center;margin:12px 0}
.analyze-macro-item{text-align:center;background:#f8faf9;padding:10px 16px;border-radius:12px;min-width:70px}
.analyze-macro-item .val{font-size:20px;font-weight:800}
.analyze-macro-item .lbl{font-size:11px;color:var(--sub);margin-top:2px}
.analyze-ingredient-tag{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;background:#f0fdf8;border-radius:20px;font-size:12px;font-weight:600;margin:3px}
</style>
</head>
<body>

<!-- Splash Screen -->
<div class="splash" id="splash">
  <div class="logo">📸</div>
  <div class="title">营养拍</div>
  <div class="sub">拍照识别 · 营养追踪</div>
</div>

<!-- Install Banner -->
<div class="install-banner" id="installBanner">
  <span class="msg">添加到主屏幕，使用更方便</span>
  <button id="btnInstall">安装</button>
  <button class="close" onclick="dismissInstall()">×</button>
</div>

<div class="app" id="app">
  <!-- Tab 1: Camera -->
  <div class="page active" id="pageCamera">
    <div class="header"><h1>📸 营养拍</h1><span id="connStatus" style="font-size:10px;padding:2px 8px;border-radius:10px;background:#eee;color:#999">检测中</span></div>
    <div class="camera-container" id="cameraBox">
      <video id="video" autoplay playsinline muted></video>
      <div class="overlay"></div>
      <div class="capture-hint" id="camHint">将食物对准框内</div>
      <button class="capture-btn" id="btnCapture" title="拍照"></button>
    </div>
    <div id="noCamera" class="card text-center hidden">
      <div style="font-size:48px;margin-bottom:8px">📷</div>
      <p style="margin:8px 0;font-size:15px">无法访问摄像头</p>
      <p class="text-sub">请在手机设置中允许摄像头权限<br>或使用"食物库"Tab 手动记录</p>
    </div>
    <div class="card" id="recentPhotosCard" style="display:none">
      <h3>最近拍摄</h3>
      <div id="recentPhotos" style="display:flex;gap:10px;overflow-x:auto;padding:4px 0;-webkit-overflow-scrolling:touch"></div>
    </div>
    <!-- Gallery & quick actions -->
    <div class="card" style="margin-top:8px">
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" style="flex:1" onclick="document.getElementById('fileInput').click()">
          🖼️ 从相册选择
        </button>
        <button class="btn btn-outline" style="flex:1" onclick="analyzePhoto()" id="btnAnalyze" disabled>
          🤖 AI 智能分析
        </button>
      </div>
      <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="handleFileSelect(event)">
    </div>

    <!-- Meal presets -->
    <div class="card" style="margin-top:8px">
      <h3>🍱 常见套餐（一键添加）</h3>
      <div id="mealPresets" style="display:flex;flex-wrap:wrap;gap:6px"></div>
    </div>

    <button class="btn btn-outline btn-block" style="margin-top:8px" onclick="switchTab('foods')">
      手动搜索食物库 →
    </button>
  </div>

  <!-- Tab 2: Food Database -->
  <div class="page" id="pageFoods">
    <div class="header"><h1>🍎 食物库</h1></div>
    <div class="search-box">
      <input type="search" id="foodSearch" placeholder="搜索食物…" oninput="renderFoodList()" autocomplete="off">
      <button onclick="switchTab('camera')">📸</button>
    </div>
    <div id="foodTags" style="margin-bottom:10px;display:flex;flex-wrap:wrap;gap:4px"></div>
    <div id="foodList"></div>
  </div>

  <!-- Tab 3: Daily Log -->
  <div class="page" id="pageDiary">
    <div class="header"><h1>📋 今日记录</h1></div>
    <div id="diaryContent"></div>
  </div>

  <!-- Tab 4: Profile -->
  <div class="page" id="pageProfile">
    <div class="header"><h1>⚙️ 我的</h1></div>
    <div class="card">
      <h3>每日营养目标</h3>
      <div class="setting-row"><span>热量目标 (kcal)</span><input type="number" id="calTarget" value="2000" min="1000" max="5000" step="50" onchange="saveSettings()"></div>
      <div class="setting-row"><span>蛋白质 (g)</span><input type="number" id="protTarget" value="60" min="20" max="200" onchange="saveSettings()"></div>
      <div class="setting-row"><span>脂肪 (g)</span><input type="number" id="fatTarget" value="55" min="20" max="150" onchange="saveSettings()"></div>
      <div class="setting-row"><span>碳水 (g)</span><input type="number" id="carbTarget" value="250" min="50" max="500" onchange="saveSettings()"></div>
    </div>
    <div class="card">
      <h3>历史记录</h3>
      <div id="historyList" style="max-height:300px;overflow-y:auto;-webkit-overflow-scrolling:touch"></div>
    </div>
    <button class="btn btn-block" style="background:#eee;color:#999;margin-top:12px" onclick="if(confirm('确定清除所有数据？此操作不可恢复。')){clearAll()}">清除所有数据</button>
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-btn active" onclick="switchTab('camera')"><span class="icon">📸</span>拍照</button>
    <button class="tab-btn" onclick="switchTab('foods')"><span class="icon">🍎</span>食物库</button>
    <button class="tab-btn" onclick="switchTab('diary')"><span class="icon">📋</span>今日</button>
    <button class="tab-btn" onclick="switchTab('profile')"><span class="icon">⚙️</span>我的</button>
  </div>
</div>

<!-- AI Analysis Modal -->
<div class="modal-overlay hidden" id="modalAnalyze">
  <div class="modal-sheet">
    <h3>🤖 AI 智能分析中</h3>
    <div id="analyzeContent" style="text-align:center;padding:20px 0">
      <div style="font-size:48px;margin-bottom:12px" id="analyzeIcon">🔍</div>
      <div id="analyzeStatus" style="font-size:14px;color:var(--sub)">正在识别食物成分…</div>
      <div style="margin-top:16px;height:4px;background:#eee;border-radius:2px;overflow:hidden">
        <div id="analyzeProgress" style="height:100%;width:0%;background:var(--mint);border-radius:2px;transition:width .3s"></div>
      </div>
    </div>
    <div id="analyzeResult" style="display:none"></div>
    <div style="display:flex;gap:8px;margin-top:12px" id="analyzeActions">
      <button class="btn btn-outline btn-block" onclick="closeAnalyzeModal()">取消</button>
    </div>
  </div>
</div>
<div class="modal-overlay hidden" id="modalPortion">
  <div class="modal-sheet">
    <h3 id="modalFoodName">选择食物</h3>

`;

// ============ CAMERA ============
async function startCamera(){
  const video=document.getElementById('video');
  const box=document.getElementById('cameraBox');
  const hint=document.getElementById('noCamera');
  try{
    if(stream){stream.getTracks().forEach(t=>t.stop())}
    stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'environment',width:{ideal:1280},height:{ideal:720}}
    });
    video.srcObject=stream;
    box.style.display='block';hint.classList.add('hidden');
    document.getElementById('camHint').textContent='将食物对准框内';
  }catch(e){
    box.style.display='none';hint.classList.remove('hidden');
  }
}
function stopCamera(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}}

document.getElementById('btnCapture').addEventListener('click',()=>{
  const video=document.getElementById('video');
  if(!video.srcObject)return;
  const canvas=document.createElement('canvas');
  canvas.width=video.videoWidth||640;
  canvas.height=video.videoHeight||480;
  canvas.getContext('2d').drawImage(video,0,0);
  pendingPhoto=canvas.toDataURL('image/jpeg',.8);
  if(navigator.vibrate)navigator.vibrate(50);
  const photos=getRecentPhotos();
  photos.unshift({src:pendingPhoto,time:Date.now()});
  if(photos.length>8)photos.length=8;
  const d=S();d.recentPhotos=photos;save(d);
  renderRecentPhotos();
  // Auto-trigger AI analysis
  analyzePhoto();
});

function getRecentPhotos(){const d=S();return d.recentPhotos||[]}

  const photos=getRecentPhotos();
  const card=document.getElementById('recentPhotosCard');
  const container=document.getElementById('recentPhotos');
  if(photos.length===0){card.style.display='none';return}
  card.style.display='block';
  container.innerHTML=photos.map((p,i)=>`<img src="${p.src}" class="preview-thumb" onclick="pickRecentPhoto(${i})" title="使用此照片">`).join('');
}

function pickRecentPhoto(i){
  const photos=getRecentPhotos();
  pendingPhoto=photos[i].src;
  analyzePhoto();
}

function handleFileSelect(e){
  const file=e.target.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(ev){
    pendingPhoto=ev.target.result;
    const photos=getRecentPhotos();
    photos.unshift({src:pendingPhoto,time:Date.now()});
    if(photos.length>8)photos.length=8;
    const d=S();d.recentPhotos=photos;save(d);
    renderRecentPhotos();
    analyzePhoto();
  };
  reader.readAsDataURL(file);
  e.target.value='';
}

// ============ AI ANALYSIS ============
function compressImage(dataUrl,maxW=512,quality=0.5){
  return new Promise(resolve=>{
    const img=new Image();
    img.onload=()=>{
      const canvas=document.createElement('canvas');
      let w=img.width,h=img.height;
      if(w>maxW){h=Math.round(h*maxW/w);w=maxW}
      canvas.width=w;canvas.height=h;
      canvas.getContext('2d').drawImage(img,0,0,w,h);
      resolve(canvas.toDataURL('image/jpeg',quality));
    };
    img.src=dataUrl;
  });
}

async function analyzePhoto(){
  if(!pendingPhoto){showToast('请先拍照或从相册选择图片');return}
  const modal=document.getElementById('modalAnalyze');
  modal.classList.remove('hidden');
  const content=document.getElementById('analyzeContent');
  const result=document.getElementById('analyzeResult');
  content.style.display='block';
  result.style.display='none';
  document.getElementById('analyzeActions').innerHTML='<button class="btn btn-outline btn-block" onclick="closeAnalyzeModal()">取消分析</button>';

  content.innerHTML=`
    <div style="margin-bottom:12px;border-radius:12px;overflow:hidden;max-height:150px">
      <img src="${pendingPhoto}" style="width:100%;height:150px;object-fit:cover;display:block">
    </div>
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:32px;margin-bottom:4px">🔍</div>
      <div style="font-size:13px;color:var(--sub)" id="analyzeStatus">正在压缩图片…</div>
      <div style="height:4px;background:#eee;border-radius:2px;overflow:hidden;margin-top:8px">
        <div id="analyzeProgress" style="height:100%;width:3%;background:var(--mint);border-radius:2px;transition:.3s"></div>
      </div>
    </div>`;

  try{
    // Step 1: compress
    updateAnalyzeUI('压缩图片中…',15);
    const compressed=await compressImage(pendingPhoto,640,0.6);

    // Step 2: send to API via proxy (/api/analyze)
    updateAnalyzeUI('AI 分析中…',30);
    const result2=await aiRecognize(compressed);

    // Step 3: show result
    updateAnalyzeUI('完成',100);
    showAnalyzeResult(result2);
  }catch(e){
    let detail=String(e.message||e).substring(0,120);
    console.error(detail);
    content.innerHTML=`
      <div style="margin-bottom:8px;border-radius:12px;overflow:hidden;max-height:120px">
        <img src="${pendingPhoto}" style="width:100%;height:120px;object-fit:cover;display:block">
      </div>

        <div style="font-size:28px;margin-bottom:4px">⚠️</div>
        <div style="font-size:13px;margin-bottom:4px">AI 分析失败</div>
        <div style="font-size:10px;color:#999;margin-bottom:8px;word-break:break-all;max-height:60px;overflow:auto">${detail}</div>
        <button class="btn btn-primary" onclick="closeAnalyzeModal();openModalForPhoto()" style="margin-bottom:4px;font-size:13px">手动搜索食物库</button>

      </div>`;
  }
}

async function aiRecognize(photoBase64){
  const prompt=`你是一个专业营养分析师。请仔细分析这张食物图片。

要求：
1. 识别图片中所有可见的食物和食材
2. 估算每种食材的可食用部分克数(以常见份量为准)
3. 根据克数计算每种食材的热量和营养素
4. 计算整道菜的总热量和总营养素

严格按以下JSON格式返回，不要加任何其他内容：
{
  "dish":"这道菜的准确名称",
  "total_cal":总热量千卡,
  "protein":总蛋白质克数,
  "fat":总脂肪克数,
  "carbs":总碳水克数,
  "items":[
    {"name":"食材名","grams":克数,"cal":该食材热量千卡,"protein":该食材蛋白质克,"fat":该食材脂肪克,"carbs":该食材碳水克}
  ]
}

注意事项：
- 食材名称使用中文，尽可能具体(如"鸭腿"而非"鸭肉"，"白米饭"而非"主食")
- 克数按常见外卖/食堂份量估算，不要过于保守
- 如果盘中有汤汁、酱料、油等也要计算进去
- total_cal必须等于所有items的cal之和
- 如有配菜(蔬菜、鸡蛋等)不要遗漏`;

  // Use Anthropic Messages format (DeepSeek Anthropic-compatible endpoint supports vision)
  const base64Data=photoBase64.split(',')[1]||photoBase64;
  const payload={
    model:'deepseek-chat',
    max_tokens:1200,
    messages:[{role:'user',content:[
      {type:'image',source:{type:'base64',media_type:'image/jpeg',data:base64Data}},
      {type:'text',text:prompt}
    ]}]
  };

  const API='/api/analyze';
  const ctrl=new AbortController();
  const timer=setTimeout(()=>ctrl.abort(),90000);

  updateAnalyzeUI('等待 AI 响应…',50);

  const resp=await fetch(API,{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(payload),
    signal:ctrl.signal
  });
  clearTimeout(timer);

  if(!resp.ok){
    const txt=await resp.text().catch(()=>'');
    throw new Error(`服务器错误 ${resp.status}: ${txt.substring(0,60)}`);
  }

  updateAnalyzeUI('解析结果…',85);

  const data=await resp.json();
  // Anthropic response format: content[0].text
  let text='';
  if (data.content && data.content[0]) {
    text = data.content[0].text;
  } else if (data.choices && data.choices[0]) {
    text = data.choices[0].message.content;
  }
  if(!text)throw new Error('API 返回异常');
  const jsonMatch=text.match(/\{[\s\S]*\}/);
  if(!jsonMatch)throw new Error('AI 未返回识别结果');
  return JSON.parse(jsonMatch[0]);
}

  if(items&&items.length){

function addMealPreset(presetName){
  const preset=MEAL_PRESETS.find(m=>m.name===presetName);
  if(!preset)return;
  const logs=getLogs(today());
  const mealType='lunch';
  let totalCal=0;
  for(const item of preset.items){
    const food=FOODS.find(f=>f.id===item.id);
    if(!food)continue;
    const r=item.g/100;
    const cal=Math.round(food.cal*r);
    totalCal+=cal;
    logs.unshift({
      foodId:food.id,name:food.name,cat:food.cat,grams:item.g,
      cal,p:+(food.p*r).toFixed(1),f:+(food.f*r).toFixed(1),c:+(food.c*r).toFixed(1),
      meal:mealType,photo:null,time:new Date().toISOString()
    });
  }
  saveLogs(today(),logs);
  showToast(`已添加 ${preset.name} · ${totalCal} kcal`);
  renderDiary();
  switchTab('diary');
}

function renderDiary(){
  const logs=getLogs(today());
  const settings=getSettings();
  const totalCal=logs.reduce((s,l)=>s+l.cal,0);
  const totalP=logs.reduce((s,l)=>s+l.p,0);
  const totalF=logs.reduce((s,l)=>s+l.f,0);
  const totalC=logs.reduce((s,l)=>s+l.c,0);
  const calPct=Math.min(100,Math.round(totalCal/settings.cal*100));
  const el=document.getElementById('diaryContent');

  let html='';
  const r=52,circ=2*Math.PI*r,dash=(1-Math.min(100,calPct)/100)*circ;
  const ringColor=calPct>110?'var(--red)':calPct>90?'#f39c12':'var(--mint)';

  html+=`<div class="card"><div class="progress-ring-wrap">
    <div class="progress-ring">
      <svg width="120" height="120" viewBox="0 0 120 120"><circle cx="60" cy="60" r="${r}" fill="none" stroke="#eee" stroke-width="10"/><circle cx="60" cy="60" r="${r}" fill="none" stroke="${ringColor}" stroke-width="10" stroke-dasharray="${circ}" stroke-dashoffset="${dash}" stroke-linecap="round" style="transition:.6s"/></svg>
      <div class="center"><span class="cal-num">${totalCal}</span><span class="cal-label">/ ${settings.cal} kcal</span></div>
    </div>
    <div class="nutrient-bars">
      <div class="nutrient-bar"><div class="nb-label"><span>蛋白质</span><span>${totalP.toFixed(1)} / ${settings.prot}g</span></div><div class="nb-track"><div class="nb-fill" style="width:${Math.min(100,totalP/settings.prot*100)}%;background:#3498db"></div></div></div>
      <div class="nutrient-bar"><div class="nb-label"><span>脂肪</span><span>${totalF.toFixed(1)} / ${settings.fat}g</span></div><div class="nb-track"><div class="nb-fill" style="width:${Math.min(100,totalF/settings.fat*100)}%;background:#e74c3c"></div></div></div>
      <div class="nutrient-bar"><div class="nb-label"><span>碳水</span><span>${totalC.toFixed(1)} / ${settings.carb}g</span></div><div class="nb-track"><div class="nb-fill" style="width:${Math.min(100,totalC/settings.carb*100)}%;background:#f39c12"></div></div></div>
    </div>
  </div></div>`;

  if(logs.length===0){
    html+='<div class="empty-state"><div class="big">🍽️</div><p>今天还没有记录</p><p class="text-sub">去拍照或搜索食物库添加</p></div>';
    el.innerHTML=html;return;
  }

  for(const [mealKey,mealName] of Object.entries(MEAL_NAMES)){
    const mealLogs=logs.filter(l=>l.meal===mealKey);
    if(mealLogs.length===0)continue;
    const mealCal=mealLogs.reduce((s,l)=>s+l.cal,0);
    html+=`<div class="meal-group"><div class="meal-title"><span class="dot"></span>${mealName} · ${mealCal} kcal</div>`;
    mealLogs.forEach((l,i)=>{
      const globalIdx=logs.indexOf(l);
      html+=`<div class="log-item">
        ${l.photo?`<img src="${l.photo}" style="width:48px;height:48px;object-fit:cover;border-radius:10px;flex-shrink:0">`:''}
        <div class="info"><div class="food-name">${l.name}</div><div class="detail">${l.grams}g · 蛋白质${l.p}g 脂肪${l.f}g 碳水${l.c}g</div></div>
        <div class="kcals">${l.cal}<span style="font-size:11px;font-weight:400"> kcal</span></div>
        <button class="del" onclick="deleteLog(${globalIdx})" title="删除">×</button>
      </div>`;
    });
    html+='</div>';
  }
  el.innerHTML=html;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  const pageMap={camera:'pageCamera',foods:'pageFoods',diary:'pageDiary',profile:'pageProfile'};
  document.getElementById(pageMap[tab]).classList.add('active');
  const tabIdx={camera:0,foods:1,diary:2,profile:3};

  const existing=document.querySelector('.toast');
  if(existing)existing.remove();
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),2000);
}

// ============ Gesture: Swipe between tabs ============
let touchStartX=0,touchStartY=0;
document.addEventListener('touchstart',e=>{
  touchStartX=e.touches[0].clientX;
  touchStartY=e.touches[0].clientY;
},{passive:true});

document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy))return;
  const tabs=['camera','foods','diary','profile'];
  const idx=tabs.indexOf(currentTab);
  if(dx>0&&idx>0)switchTab(tabs[idx-1]);
  if(dx<0&&idx<tabs.length-1)switchTab(tabs[idx+1]);
});

// ============ Keyboard nav (desktop test) ============
document.addEventListener('keydown',e=>{
  const tabs=['camera','foods','diary','profile'];
  const idx=tabs.indexOf(currentTab);
  if(e.key==='ArrowLeft'&&idx>0)switchTab(tabs[idx-1]);
  if(e.key==='ArrowRight'&&idx<tabs.length-1)switchTab(tabs[idx+1]);
});

// Check server connection on load
(async function checkConn(){
  const el=document.getElementById('connStatus');
  if(!el)return;
  try{
    const r=await fetch('/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'deepseek-chat',max_tokens:5,messages:[{role:'user',content:'test'}]})});
    if(r.ok||r.status===400){
      el.textContent='✅ AI 就绪';el.style.background='#eafaf1';el.style.color='#27ae60';return;
    }
  }catch(e){}
  el.textContent='⚡ 离线模式';el.style.background='#fef9e7';el.style.color='#e67e22';
})();

// ============ INIT ============
document.getElementById('portionInput').addEventListener('input',updatePreview);
document.getElementById('calTarget').value=getSettings().cal;
document.getElementById('protTarget').value=getSettings().prot;
document.getElementById('fatTarget').value=getSettings().fat;
document.getElementById('carbTarget').value=getSettings().carb;

startCamera();
renderRecentPhotos();
renderMealPresets();
renderFoodTags();
renderFoodList();

// Handle visibility change - restart camera when app comes back
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&currentTab==='camera')startCamera();
  if(document.hidden)stopCamera();
});
</script>
